{% extends "base.html" %}
{% block content %}
  <h1>세션 목록</h1>
  <table>
    <thead>
      <tr><th>날짜</th><th>이름</th><th>거리(km)</th><th>페이스</th><th>평균HR</th><th>HR존</th><th>랩수</th><th>타입</th></tr>
    </thead>
    <tbody>
      {% for s in sessions %}
      <tr>
        <td>{{ s.date }}</td>
        <td><a href="/activity/{{ s.id }}">{{ s.name }}</a></td>
        <td>{{ s.distance_km }}</td>
        <td>{{ s.avg_pace_str }}</td>
        <td>{{ s.avg_hr or '-' }}</td>
        <td>{{ s.hr_zone or '-' }}</td>
        <td>{{ s.lap_count }}</td>
        <td><span class="tag tag-{{ s.type }}">{{ s.type }}</span></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
